version: v1

project:
  name: slack_support
  vars:
    - name: GEMINI_API_KEY
      value: "your api key"
    - name: HELP_REQUEST_TIMEOUT_MINUTES
      value: "10"
    - name: HELP_REQUEST_IDLE_TIMEOUT_MINUTES
      value: "10"
  connections:
    - name: slack
      integration: slack
  triggers:
    - name: slack_app_mention
      connection: slack
      event_type: app_mention
      call: main.py:on_slack_mention
